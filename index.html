<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#178c95" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="default"
    />
    <title>Evenly — Split receipts easily</title>
    <meta
      name="description"
      content="Evenly helps groups split receipts, track shared items, and settle up clearly on mobile and desktop."
    />
    <link rel="icon" type="image/svg+xml" href="/evenly-icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Capture Supabase recovery tokens before PWA SW / React; HashRouter breaks GoTrue's URL parser. -->
    <script>
      (function () {
        try {
          var h = window.location.hash || '';
          if (h.indexOf('access_token=') < 0 && h.indexOf('refresh_token=') < 0 && h.indexOf('code=') < 0)
            return;
          var raw = h.charAt(0) === '#' ? h.slice(1) : h;
          var params = {};
          raw.split(/[?&]/).forEach(function (part) {
            if (!part || part.indexOf('=') < 0) return;
            var i = part.indexOf('=');
            var k = decodeURIComponent(part.slice(0, i).replace(/\+/g, ' '));
            var v = decodeURIComponent(part.slice(i + 1).replace(/\+/g, ' '));
            if (k) params[k] = v;
          });
          var payload = null;
          if (params.access_token && params.refresh_token) {
            payload = { access_token: params.access_token, refresh_token: params.refresh_token };
          } else if (params.code) {
            payload = { code: params.code };
          }
          if (payload) {
            sessionStorage.setItem('evenly:auth:pending', JSON.stringify(payload));
            var route = '#/reset-password';
            var m = h.match(/^#(\/[^?&]*)/);
            if (m) route = '#' + m[1];
            window.history.replaceState(window.history.state, '', window.location.pathname + route);
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
