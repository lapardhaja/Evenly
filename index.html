<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#178c95" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="default"
    />
    <title>Evenly — Split receipts easily</title>
    <meta
      name="description"
      content="Evenly helps groups split receipts, track shared items, and settle up clearly on mobile and desktop."
    />
    <link rel="icon" type="image/svg+xml" href="/evenly-icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Stash Supabase auth params before SW/React (HashRouter + implicit recovery tokens in hash). -->
    <script>
      (function () {
        try {
          function parseSegmented(qs) {
            var params = {};
            if (!qs) return params;
            qs.split('&').forEach(function (part) {
              if (!part || part.indexOf('=') < 0) return;
              var i = part.indexOf('=');
              var k = decodeURIComponent(part.slice(0, i).replace(/\+/g, ' '));
              var v = decodeURIComponent(part.slice(i + 1).replace(/\+/g, ' '));
              if (k) params[k] = v;
            });
            return params;
          }
          var h = window.location.hash || '';
          var search = window.location.search || '';
          var fromHash = {};
          if (h.length > 1) {
            var raw = h.charAt(0) === '#' ? h.slice(1) : h;
            raw.split(/[?&]/).forEach(function (part) {
              if (!part || part.indexOf('=') < 0) return;
              var i = part.indexOf('=');
              var k = decodeURIComponent(part.slice(0, i).replace(/\+/g, ' '));
              var v = decodeURIComponent(part.slice(i + 1).replace(/\+/g, ' '));
              if (k) fromHash[k] = v;
            });
          }
          var fromSearch = parseSegmented(search.charAt(0) === '?' ? search.slice(1) : search);
          var params = Object.assign({}, fromSearch, fromHash);
          if (
            !params.access_token &&
            !params.refresh_token &&
            !params.code &&
            !params.token_hash
          )
            return;
          var payload = {};
          if (params.access_token && params.refresh_token) {
            payload.access_token = params.access_token;
            payload.refresh_token = params.refresh_token;
          }
          if (params.code) payload.code = params.code;
          if (params.token_hash) payload.token_hash = params.token_hash;
          if (params.type) payload.type = params.type;
          if (Object.keys(payload).length === 0) return;
          sessionStorage.setItem('evenly:auth:pending', JSON.stringify(payload));
          var route = '#/update-password';
          var m = h.match(/^#(\/[^?&]*)/);
          if (m) route = '#' + m[1];
          else if (!h || h === '#') route = '#/update-password';
          window.history.replaceState(window.history.state, '', window.location.pathname + route);
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
